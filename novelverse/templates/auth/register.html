{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:440px">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-family:var(--font-head);font-size:2rem;color:var(--gold);margin-bottom:0.5rem">NovelVerse</div>
      <h2>Join the community</h2>
      <p style="color:var(--text3)">Read thousands of stories or start writing your own</p>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus placeholder="Choose a username" minlength="3" maxlength="30">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="Choose a strong password" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem">Create Account</button>
        </form>
      </div>
    </div>
    <p style="text-align:center;margin-top:1rem;color:var(--text3)">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
