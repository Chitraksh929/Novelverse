{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:420px">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-family:var(--font-head);font-size:2rem;color:var(--gold);margin-bottom:0.5rem">NovelVerse</div>
      <h2>Welcome back</h2>
      <p style="color:var(--text3)">Sign in to continue your reading journey</p>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <div class="form-group">
            <label class="form-label">Username or Email</label>
            <input type="text" name="identifier" class="form-control" required autofocus placeholder="Enter username or email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required placeholder="Enter password">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem">Sign In</button>
        </form>
      </div>
    </div>
    <p style="text-align:center;margin-top:1rem;color:var(--text3)">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
