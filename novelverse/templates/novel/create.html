{% extends "base.html" %}
{% block title %}Create Novel{% endblock %}
{% block content %}
<div class="container-sm" style="padding-top:2rem;padding-bottom:3rem">
  <a href="{{ url_for('author_dashboard') }}" style="color:var(--text3);font-size:0.9rem;display:inline-block;margin-bottom:1.5rem">‹ Dashboard</a>
  <h1 style="margin-bottom:2rem">Create New Novel</h1>
  <div class="card">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
          <label class="form-label">Title <span style="color:var(--danger)">*</span></label>
          <input type="text" name="title" class="form-control" required autofocus placeholder="Enter your novel's title…" maxlength="200">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="5" placeholder="Write a compelling synopsis for your novel…"></textarea>
          <div class="form-hint">A good description brings in readers. Aim for 100–300 words.</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label class="form-label">Genre</label>
            <select name="genre" class="form-control">
              <option value="">Select genre…</option>
              {% for g in ['Fantasy','Sci-Fi','Romance','Thriller','Horror','Mystery','Adventure','Historical Fiction','LitRPG','Cultivation','Isekai','Slice of Life','Drama','Comedy','Action','Progression Fantasy','Dark Fantasy','Urban Fantasy','Portal Fantasy','Supernatural'] %}
              <option value="{{ g }}">{{ g }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select name="status" class="form-control">
              <option value="ongoing">Ongoing</option>
              <option value="completed">Completed</option>
              <option value="hiatus">Hiatus</option>
              <option value="draft">Draft (Hidden)</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Cover Image <span style="color:var(--text3);font-weight:300;text-transform:none;font-size:0.85rem">(optional)</span></label>
          <div style="display:flex;flex-direction:column;gap:0.75rem">
            <div>
              <label style="font-size:0.82rem;color:var(--text3);margin-bottom:0.3rem;display:block">Upload an image file</label>
              <input type="file" name="cover_file" class="form-control" accept="image/*" id="cover-file-input"
                style="padding:0.45rem 0.75rem;cursor:pointer">
              <div id="cover-preview" style="margin-top:0.5rem;display:none">
                <img id="cover-preview-img" style="max-width:150px;border-radius:var(--radius);border:1px solid var(--border)" alt="Preview">
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <div style="flex:1;height:1px;background:var(--border)"></div>
              <span style="font-size:0.78rem;color:var(--text3)">OR</span>
              <div style="flex:1;height:1px;background:var(--border)"></div>
            </div>
            <div>
              <label style="font-size:0.82rem;color:var(--text3);margin-bottom:0.3rem;display:block">Paste an image URL</label>
              <input type="url" name="cover_url" class="form-control" placeholder="https://example.com/cover.jpg">
            </div>
          </div>
          <div class="form-hint">Recommended aspect ratio: 2:3 (portrait). Max file size: 5MB.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Tags <span style="color:var(--text3);font-weight:300;text-transform:none;font-size:0.85rem">(comma-separated, up to 10)</span></label>
          <input type="text" name="tags" class="form-control" placeholder="e.g. magic-system, overpowered-mc, slow-burn…">
        </div>
        <div style="display:flex;gap:1rem;margin-top:0.5rem">
          <button type="submit" class="btn btn-primary">Create Novel</button>
          <a href="{{ url_for('author_dashboard') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
